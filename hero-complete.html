<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interactive Globe</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
        }
        #hero {
            position: absolute;
            top: 20%;
            left: 50%;
            transform: translate(-50%, -20%);
            color: white;
            text-align: center;
            z-index: 1;
        }
        canvas {
            display: block;
        }
    </style>
</head>
<body>
    <div id="hero">
        <h1>Welcome to the Interactive Globe</h1>
        <p>Your journey around the world begins here!</p>
    </div>
    <canvas id="globe"></canvas>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script>
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ canvas: document.getElementById('globe') });
        renderer.setSize(window.innerWidth, window.innerHeight);

        const geometry = new THREE.SphereGeometry(5, 32, 32);
        const texture = new THREE.TextureLoader().load('https://example.com/world-map.jpg'); // Update the URL with actual map texture
        const material = new THREE.MeshBasicMaterial({ map: texture });
        const globe = new THREE.Mesh(geometry, material);
        scene.add(globe);

        camera.position.z = 10;

        function animate() {
            requestAnimationFrame(animate);
            globe.rotation.y += 0.01;
            renderer.render(scene, camera);
        }
        animate();
    </script>
</body>
</html>
